version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eduvision_nexus
    ports:
      - '5432:5432'
  api:
    build: .
    env_file:
      - backend/.env.example
    ports:
      - '8000:8000'
    depends_on:
      - db
